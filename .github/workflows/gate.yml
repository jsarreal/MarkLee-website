name: Integrity Gate

on:
  pull_request:
    branches:
      - main

jobs:
  gate:
    name: Run Integrity Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run gate.sh
        run: |
          chmod +x gate.sh
          ./gate.sh
